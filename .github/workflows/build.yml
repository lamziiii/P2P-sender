name: Build/Release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build & Distribute
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List Release Files
        run: ls -R release/
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: P2PShare-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.appimage
            release/*.deb
            release/*.rpm
          if-no-files-found: warn

  publish:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          name: "P2PShare Release"
          body: |
            ## 🎉 Nouvelle version disponible !
            
            Cette release contient les exécutables pour Windows, macOS et Linux.
            
            ### 🛠️ Changements
            - Build automatisé des binaires.
            - Améliorations de l'interface et de la performance.
            
            ### 📦 Fichiers inclus
            - **Windows** : .exe (Installeur)
            - **macOS** : .dmg / .zip
            - **Linux** : .AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
